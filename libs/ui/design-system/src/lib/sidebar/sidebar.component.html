<!-- 
  Audit-Proof Accessibility: 
  Utilizes Angular CDK cdkMenu/cdkMenuItem for automated focus management and keyboard 
  navigation (Roving Tabindex), adhering to WCAG 2.1 standards for accessible enterprise 
  navigation. Semantic buttons ensure consistent behavior across screen readers. 
-->
<nav class="sidebar flex flex-col bg-gray-800 text-gray-100 h-screen shadow-lg transition-all duration-300"
     [class.collapsed]="collapsed()"
     [class.w-[250px]]="!collapsed()"
     [class.w-[64px]]="collapsed()">
  @if (!collapsed()) {
    <div class="sidebar-header p-4 font-bold text-xl border-b border-gray-700">
      Portal
    </div>
  }
  <ul class="sidebar-menu flex flex-col py-2 list-none m-0 grow focus:outline-none" cdkMenu>
    @for (item of menuItems(); track item.label) {
      @if (item.privilege) {
        <li role="none" *taiHasPrivilege="item.privilege">
          <ng-container *ngTemplateOutlet="menuItemTpl; context: { $implicit: item }"></ng-container>
        </li>
      } @else {
        <li role="none">
          <ng-container *ngTemplateOutlet="menuItemTpl; context: { $implicit: item }"></ng-container>
        </li>
      }
    }
  </ul>
</nav>

<ng-template #menuItemTpl let-item>
  <button class="sidebar-menu-item px-4 py-3 cursor-pointer flex items-center no-underline color-inherit transition-colors duration-200 bg-transparent border-none w-full text-left font-inherit select-none outline-none box-border hover:bg-gray-700 focus:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:ring-inset"
      cdkMenuItem
      type="button"
      [routerLink]="item.link"
      [title]="item.label">
    @if (item.icon) {
      <span class="sidebar-menu-item-icon mr-3 text-lg" [class.mr-0]="collapsed()">{{ item.icon }}</span>
    }
    @if (!collapsed()) {
      <span class="sidebar-menu-item-label truncate">{{ item.label }}</span>
    }
  </button>
</ng-template>
