<!-- 
  Audit-Proof Accessibility: 
  Utilizes Angular CDK cdkMenu/cdkMenuItem for automated focus management and keyboard 
  navigation (Roving Tabindex), adhering to WCAG 2.1 standards for accessible enterprise 
  navigation. Semantic buttons ensure consistent behavior across screen readers. 
-->
<nav class="sidebar" [class.collapsed]="collapsed">
  @if (!collapsed) {
    <div class="sidebar-header">
      Portal
    </div>
  }
  <ul class="sidebar-menu" cdkMenu>
    @for (item of menuItems; track item.label) {
      <li role="none">
        <button class="sidebar-menu-item"
           cdkMenuItem
           type="button"
           [title]="item.label">
          @if (item.icon) {
            <span class="sidebar-menu-item-icon">{{ item.icon }}</span>
          }
          @if (!collapsed) {
            <span class="sidebar-menu-item-label">{{ item.label }}</span>
          }
        </button>
      </li>
    }
  </ul>
</nav>
