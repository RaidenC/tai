<div class="secure-input-container flex flex-col mb-6 w-full">
  <!-- 
    Accessible Label:
    Ensures that the input field is correctly associated with its description 
    for screen readers (Accessibility / Compliance).
  -->
  <label
    [for]="id()"
    class="secure-input-label text-sm font-semibold text-gray-700 mb-2"
    >{{ label() }}</label
  >

  <!-- 
    The Input Element:
    Avoiding Angular Material to maintain 100% control over the DOM.
    Strictly controlling attributes like autocomplete and type to prevent 
    stealer log extraction.
  -->
  <input
    [id]="id()"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="isDisabled()"
    [attr.autocomplete]="type() === 'password' ? 'new-password' : (type() === 'email' ? 'email' : 'off')"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="secure-input-field px-4 py-3 text-base text-gray-900 bg-white border border-gray-300 rounded-md shadow-sm transition-all duration-200 ease-in-out outline-none focus:border-blue-600 focus:ring-3 focus:ring-blue-600/10 placeholder:text-gray-400 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed"
    [class.error]="errorMessage() && isTouched()"
    [class.secure-password-input]="type() === 'password'"
    [class.error-state]="errorMessage() && isTouched()"
    [class.password-mask]="type() === 'password'"
    aria-invalid="false"
  />

  <!-- 
    Trusted HTML Sink:
    The dynamic error message is sanitized using the TrustedTypesService 
    before being bound to [innerHTML] to prevent DOM-based XSS attacks.
  -->
  @if (errorMessage() && isTouched()) {
  <div
    class="error-message mt-2 text-xs text-red-600 font-medium"
    [innerHTML]="trustedErrorMessage()"
    aria-live="polite"
    role="alert"
  ></div>
  }
</div>
