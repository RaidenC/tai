<div class="pending-approvals-tile p-6 bg-white rounded-lg shadow-md border border-gray-200">
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-xl font-bold text-gray-900">Pending Approvals</h3>
    <span class="px-3 py-1 bg-yellow-100 text-yellow-800 text-xs font-semibold rounded-full">
      {{ users().length }} Awaiting
    </span>
  </div>

  @if (users().length > 0) {
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="text-xs font-semibold uppercase tracking-wider text-gray-500 border-b border-gray-100">
            <th class="py-3 px-2">User</th>
            <th class="py-3 px-2">Email</th>
            <th class="py-3 px-2 text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users(); track user.id) {
            <tr class="user-row hover:bg-gray-50 transition-colors border-b border-gray-50">
              <td class="py-4 px-2">
                <div class="text-sm font-medium text-gray-900">{{ user.name }}</div>
              </td>
              <td class="py-4 px-2">
                <div class="text-sm text-gray-500">{{ user.email }}</div>
              </td>
              <td class="py-4 px-2 text-right">
                <button
                  type="button"
                  (click)="onApprove(user.id)"
                  class="approve-button px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded hover:bg-emerald-700 transition-all shadow-sm active:translate-y-px"
                >
                  Approve
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  } @else {
    <div class="flex flex-col items-center justify-center py-10 text-gray-500">
      <svg class="w-12 h-12 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <p class="text-sm font-medium">All clear! No pending approvals.</p>
    </div>
  }
</div>
