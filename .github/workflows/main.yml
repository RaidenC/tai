name: TAI Portal CI

on:
  push:
    branches: [ main, 'epic/*' ]
  pull_request:
    branches: [ main, 'epic/*' ]

permissions:
  contents: read
  pull-requests: read
  actions: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  GATEWAY_SECRET: ${{ secrets.GATEWAY_SECRET }}
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  ci:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: portal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.103'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Restore .NET projects
        run: dotnet restore tai-portal.slnx

      - name: Lint Affected
        run: npx nx affected -t lint

      - name: Build Affected
        run: npx nx affected -t build

      - name: Test Affected
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Database=portal;Username=postgres;Password=postgres
        run: |
          npx nx affected -t test
          if [ -d "coverage" ]; then
            node scripts/check-coverage.js
          fi

  e2e:
    needs: ci
    if: github.base_ref == 'main' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: portal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.103'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Local DNS
        run: |
          echo "127.0.0.1 acme.localhost" | sudo tee -a /etc/hosts

      - name: Start Background Services
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Database=portal;Username=postgres;Password=postgres
        run: |
          # Start Backend
          npx nx run portal-api:serve --launchProfile=http &
          npx nx run portal-gateway:serve &
          
          # Start Portal Web (Bind to 0.0.0.0 for CI reachability)
          npx nx run portal-web:serve --port=4200 --host=0.0.0.0 &
          
          # Start Identity UI (needed for redirects)
          npx nx run identity-ui:serve --host=0.0.0.0 &
          
          # Wait for services to be ready via TCP (most resilient CI check)
          # portal-api (5031), gateway (5217), portal-web (4200), identity-ui (4300)
          npx wait-on tcp:localhost:5031 tcp:localhost:5217 tcp:localhost:4200 tcp:localhost:4300 --timeout 180000

      - name: Run E2E Affected
        run: npx nx affected -t e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/portal-api/Dockerfile
          push: false # Set to true and add login step when registry is ready
          tags: tai/portal-api:latest

      - name: Build Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/portal-gateway/Dockerfile
          push: false
          tags: tai/portal-gateway:latest
